name: Typecheck

# Пуши в main проверяет deploy.yml — иначе tsc гонялся бы дважды на коммит.
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
