name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Параллельные деплои подрались бы за docker compose в одной директории.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --prune origin
            # Жёстко на конкретный коммит: хост — не место для локальных правок.
            git reset --hard ${{ github.sha }}
            bash scripts/deploy.sh
