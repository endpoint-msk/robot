name: Release

# Релиз выпускается пушем тега vX.Y.Z (тег и есть версия — package.json не бампаем).
# Ченджлог собираем сами из `git log` между прошлым и текущим тегом — все коммиты,
# не только PR-ы (GitHub-овский --generate-notes показывает лишь смёрдженные PR).
# Тег на dev-ветке игнорируем: релизим только то, что доехало до main.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          set -euo pipefail
          git fetch --quiet origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Тег $GITHUB_REF_NAME не на main — релиз не создаём."
            exit 1
          fi

      - name: Create GitHub Release from commit log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Прошлый тег = ближайший тег-предок текущего. Нет (первый релиз) —
          # берём всю историю до тега.
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then range="${prev}..${GITHUB_REF_NAME}"; else range="${GITHUB_REF_NAME}"; fi
          notes=$(git log --no-merges --reverse --pretty=format:'- %s' "$range")
          [ -z "$notes" ] && notes="- Без заметных изменений."
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "$notes"
