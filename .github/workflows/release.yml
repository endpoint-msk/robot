name: Release

# Релиз выпускается пушем тега vX.Y.Z (тег и есть версия — package.json не бампаем).
# Ченджлог — авто-нотсы GitHub из PR/коммитов с прошлого релиза (включая PR-ы с dev).
# Тег на dev-ветке игнорируем: релизим только то, что доехало до main.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          set -euo pipefail
          git fetch --quiet origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Тег $GITHUB_REF_NAME не на main — релиз не создаём."
            exit 1
          fi

      - name: Create GitHub Release with autogenerated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
